<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0f172a;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: hidden;
    }
    .logo {
      width: 60px; height: 60px;
      background: #6366f1;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      font-size: 30px;
      color: #fff;
      box-shadow: 0 8px 24px rgba(99,102,241,0.4);
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #6366f1;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 0.82rem;
      color: #94a3b8;
      margin-bottom: 30px;
    }
    .bar-wrap {
      width: 200px; height: 4px;
      background: #1e293b;
      border-radius: 4px;
      overflow: hidden;
    }
    .bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #6366f1, #818cf8);
      border-radius: 4px;
      animation: prog 18s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes prog { to { width: 92%; } }
    .version {
      position: absolute;
      bottom: 16px;
      font-size: 0.7rem;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="logo">&#9881;</div>
  <h1>CoilMS</h1>
  <p>Starting application&hellip;</p>
  <div class="bar-wrap"><div class="bar"></div></div>
  <span class="version">Coil &amp; Sheet Management System</span>
</body>
</html>
