<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CoilMS" />

  <!-- PWA manifest (enables "Add to Home Screen" / installable on Android) -->
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}" />

  <!-- ── Local vendor assets (work fully offline after first load) ─────────── -->
  <script src="{{ url_for('static', filename='vendor/vue.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/vue-router.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/vuex.min.js') }}"></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap-icons.min.css') }}" />

  <!-- App styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />

  <title>CoilMS — Coil &amp; Sheet Management</title>
</head>
<body>
  <div id="app"></div>

  <script src="{{ url_for('static', filename='index.js') }}" type="module"></script>

  <script src="{{ url_for('static', filename='vendor/bootstrap.bundle.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/chart.min.js') }}"></script>

  <!-- Register service worker for offline-first support -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js', { scope: '/' })
        .then(reg => {
          // Prompt reload when a new SW version is waiting
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage({ type: 'SKIP_WAITING' });
                window.location.reload();
              }
            });
          });
        })
        .catch(err => console.warn('[SW] Registration failed:', err));
    }
  </script>
</body>
</html>
