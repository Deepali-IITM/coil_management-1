name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies + PyInstaller
        run: |
          pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bundle Flask server with PyInstaller (spec file)
        run: |
          pyinstaller coilms_server.spec
          New-Item -ItemType Directory -Force -Path dist_server
          Copy-Item dist\coilms_server.exe dist_server\
          if (-not (Test-Path dist_server\coilms_server.exe)) {
            Write-Error "coilms_server.exe not found after PyInstaller build"
            exit 1
          }
          Write-Host "Bundle size: $((Get-Item dist_server\coilms_server.exe).Length / 1MB) MB"

      - name: Install Node dependencies
        run: npm install

      - name: Build Electron installer
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoilMS-Windows-Installer
          path: dist_electron/*.exe
          retention-days: 30
